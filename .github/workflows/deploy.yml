name: Check and Deploy to NPM

on:
  push:
    branches: 
      - deploy

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed packages
        id: set-matrix
        run: |
          # 获取最后一次成功运行的提交SHA或默认为一个空树
          git fetch origin tag last-deploy --force 2>/dev/null || true
          if git rev-parse -q --verify refs/tags/last-deploy >/dev/null; then
            BASE_SHA=$(git rev-parse refs/tags/last-deploy)
            echo "Using last successful deploy tag as base: $BASE_SHA"
          else
            echo "No last-deploy tag found, using first commit in history"
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi
          
          HEAD_SHA=${{ github.sha }}
          
          echo "Comparing $BASE_SHA...$HEAD_SHA"

          mapfile -t CHANGED_PACKAGES < <(
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" |
            awk -F/ 'NF > 1 { print $1 }' |
            while read -r dir; do
              if [ -f "$dir/package.json" ]; then
                printf '%s\n' "$dir"
              fi
            done |
            sort -u
          )

          if [ ${#CHANGED_PACKAGES[@]} -gt 0 ]; then
            echo "Detected changed packages: ${CHANGED_PACKAGES[*]}"
          fi
          
          if [ ${#CHANGED_PACKAGES[@]} -eq 0 ]; then
            echo "matrix={\"package\":[]}" >> $GITHUB_OUTPUT
            echo "No packages changed"
          else
            JSON_ARRAY=$(printf '"%s",' "${CHANGED_PACKAGES[@]}" | sed 's/,$//')
            echo "matrix={\"package\":[$JSON_ARRAY]}" >> $GITHUB_OUTPUT
            echo "Changed packages: ${CHANGED_PACKAGES[@]}"
          fi
      

  build-and-publish:
    needs: detect-changes
    if: ${{ github.event_name == 'push' && needs.detect-changes.outputs.matrix != '{"package":[]}' && github.ref == 'refs/heads/deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      # 并行发布变更包，显著缩短整体发布时间
      max-parallel: 6
      fail-fast: false
    steps:
      - name: Check UPDATE_ALL flag
        id: check-update-all
        run: |
          if [[ "${{ secrets.UPDATE_ALL }}" == "true" ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi
  
      - name: echo matrix
        if: steps.check-update-all.outputs.should_skip != 'true'
        run: echo "${{ toJson(matrix) }}"

      - name: Checkout code
        if: steps.check-update-all.outputs.should_skip != 'true'
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: Setup Node.js
        if: steps.check-update-all.outputs.should_skip != 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: ${{ secrets.REGISTRY_URL }}
      
      # - name: Install dependencies
      #   run: |
      #     cd ${{ matrix.package }}
      #     npm ci || npm install
      
      - name: Build package
        if: steps.check-update-all.outputs.should_skip != 'true'
        run: |
          cd ${{ matrix.package }}
          npm run build --if-present
      
      - name: Publish to Registry 2
        if: steps.check-update-all.outputs.should_skip != 'true'
        env:
          REGISTRY_2: ${{ secrets.REGISTRY_URL_2 }}
          TOKEN_2: ${{ secrets.NPM_TOKEN_2 }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          if [ -z "$REGISTRY_2" ] || [ -z "$TOKEN_2" ]; then
            echo "Registry 2 secrets not set, skipping."
            exit 0
          fi

          cd ${{ matrix.package }}
          
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Current version: $CURRENT_VERSION"

          echo "----------------------------------------"
          echo "Processing second registry: $REGISTRY_2"
          
          # 去掉协议头获取 host
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2" | sed 's/^https\?:\/\///')
          # 去掉可能存在的尾部斜杠
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2_NO_PROTO" | sed 's/\/$//')
          
          # 在当前目录生成 .npmrc，确保优先级最高且配置准确
          echo "registry=$REGISTRY_2" > .npmrc
          echo "//$REGISTRY_2_NO_PROTO/:_authToken=$TOKEN_2" >> .npmrc
          
          # 检查是否存在
          if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
            echo "Version $CURRENT_VERSION exists on $REGISTRY_2, unpublishing..."
            retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
            sleep 5
          fi
          
          # 发布
          retry_with_backoff 5 5 npm publish --access public
          
          # 清理临时配置文件
          rm .npmrc

      - name: Notify cache bump for Registry 2
        if: steps.check-update-all.outputs.should_skip != 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL_2 }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN_2 }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL_2 or NOTIFY_TOKEN_2 not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response_2.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification (Registry 2) request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification (Registry 2) sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification (Registry 2) failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response_2.txt || true
          fi

      - name: Publish to Default Registry
        if: steps.check-update-all.outputs.should_skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }
          export -f retry_with_backoff

          mark_manual_publish() {
            local package_name="$1"
            local package_version="$2"
            local package_dir="$3"

            echo "::warning::Default registry publish timed out after 5 minutes for ${package_name}@${package_version} (${package_dir}). Please publish it manually."
            {
              echo "### Manual publish required"
              echo "- Package: ${package_name}@${package_version}"
              echo "- Directory: ${package_dir}"
              echo "- Reason: publish to default registry timed out after 5 minutes"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          cd ${{ matrix.package }}
          # 确保清理掉可能残留的 .npmrc
          rm -f .npmrc
          
          # 获取当前版本号
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Current version: $CURRENT_VERSION"
          
          # 检查当前版本是否已在 NPM registry 上发布
          if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
            echo "版本 $CURRENT_VERSION 已存在，尝试取消发布..."
            retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
            sleep 5
          fi
          
          # 发布
          set +e
          timeout 5m bash -lc 'retry_with_backoff 5 5 npm publish --access public'
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            if [ "$STATUS" -eq 124 ]; then
              mark_manual_publish "$PACKAGE_NAME" "$CURRENT_VERSION" "${{ matrix.package }}"
              exit 0
            fi
            exit "$STATUS"
          fi

      - name: Notify cache bump
        if: steps.check-update-all.outputs.should_skip != 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL or NOTIFY_TOKEN not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response.txt || true
          fi
  
  build-and-publish-all:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
    steps:
      - name: Check UPDATE_ALL flag
        id: check-update-all
        run: |
          if [[ "${{ secrets.UPDATE_ALL }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
  
      - name: Checkout code
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/deploy' && steps.check-update-all.outputs.should_run == 'true' }}
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: Setup Node.js
        if: steps.check-update-all.outputs.should_run == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: ${{ secrets.REGISTRY_URL }}
      
      - name: Publish All to Registry 2
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          REGISTRY_2: ${{ secrets.REGISTRY_URL_2 }}
          TOKEN_2: ${{ secrets.NPM_TOKEN_2 }}
          NPM_PUBLISH_PARALLEL: 4
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          publish_registry2_one() {
            local dir="$1"
            (
              cd "$dir"
              echo "发布 $dir 到 Registry 2"
              CURRENT_VERSION=$(node -p "require('./package.json').version")
              PACKAGE_NAME=$(node -p "require('./package.json').name")
              echo "当前版本: $CURRENT_VERSION"

              if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
                echo "Version $CURRENT_VERSION exists on $REGISTRY_2, unpublishing..."
                retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
                sleep 5
              fi

              retry_with_backoff 5 5 npm publish --access public
            )
          }

          if [ -z "$REGISTRY_2" ] || [ -z "$TOKEN_2" ]; then
            echo "Registry 2 secrets not set, skipping."
            exit 0
          fi

          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2" | sed 's/^https\?:\/\///')
          # 去掉可能存在的尾部斜杠
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2_NO_PROTO" | sed 's/\/$//')
          
          # 在当前目录生成 .npmrc
          echo "registry=$REGISTRY_2" > .npmrc
          echo "//$REGISTRY_2_NO_PROTO/:_authToken=$TOKEN_2" >> .npmrc

          PACKAGE_DIRS=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "./package.json" -exec dirname {} \; | sed 's/^\.\///')
          echo "Found packages: $PACKAGE_DIRS"
          # 仅保留一级目录
          FIRST_LEVEL_DIRS=()
          for dir in $PACKAGE_DIRS; do
            if [[ "$dir" != *"/"* ]]; then
              FIRST_LEVEL_DIRS+=("$dir")
            fi
          done
          
          echo "要发布的一级目录包: ${FIRST_LEVEL_DIRS[*]}"

          PARALLEL=${NPM_PUBLISH_PARALLEL:-4}
          FAIL=0
          PIDS=()

          for dir in "${FIRST_LEVEL_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "目录 $dir 不存在，跳过..."
              continue
            fi

            publish_registry2_one "$dir" &
            PIDS+=("$!")

            if [ "${#PIDS[@]}" -ge "$PARALLEL" ]; then
              if ! wait -n; then
                FAIL=1
              fi
              PIDS=($(jobs -pr))
            fi
          done

          for pid in "${PIDS[@]}"; do
            if ! wait "$pid"; then
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "One or more package publishes failed on Registry 2"
            exit 1
          fi
          
          # 清理
          rm .npmrc

      - name: Notify cache bump for Registry 2
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL_2 }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN_2 }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL_2 or NOTIFY_TOKEN_2 not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response_2.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification (Registry 2) request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification (Registry 2) sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification (Registry 2) failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response_2.txt || true
          fi
      
      - name: Publish All to Default Registry
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_PARALLEL: 4
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }
          export -f retry_with_backoff

          MANUAL_LOG="$RUNNER_TEMP/manual-default-publish.txt"
          : > "$MANUAL_LOG"

          mark_manual_publish() {
            local package_name="$1"
            local package_version="$2"
            local package_dir="$3"

            echo "::warning::Default registry publish timed out after 5 minutes for ${package_name}@${package_version} (${package_dir}). Please publish it manually."
            printf '%s\n' "${package_name}@${package_version} | ${package_dir} | publish to default registry timed out after 5 minutes" >> "$MANUAL_LOG"
          }

          publish_default_one() {
            local dir="$1"
            (
              cd "$dir"
              echo "发布 $dir"
              CURRENT_VERSION=$(node -p "require('./package.json').version")
              PACKAGE_NAME=$(node -p "require('./package.json').name")
              echo "当前版本: $CURRENT_VERSION"

              if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
                echo "版本 $CURRENT_VERSION 已存在，尝试取消发布..."
                retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
                sleep 5
              fi

              set +e
              timeout 5m bash -lc 'retry_with_backoff 5 5 npm publish --access public'
              STATUS=$?
              set -e
              if [ "$STATUS" -ne 0 ]; then
                if [ "$STATUS" -eq 124 ]; then
                  mark_manual_publish "$PACKAGE_NAME" "$CURRENT_VERSION" "$dir"
                  exit 0
                fi
                exit "$STATUS"
              fi
            )
          }

          # 确保清理掉可能残留的 .npmrc
          rm -f .npmrc

          PACKAGE_DIRS=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "./package.json" -exec dirname {} \; | sed 's/^\.\///')
          echo "Found packages: $PACKAGE_DIRS"
          # 仅保留一级目录
          FIRST_LEVEL_DIRS=()
          for dir in $PACKAGE_DIRS; do
            if [[ "$dir" != *"/"* ]]; then
              FIRST_LEVEL_DIRS+=("$dir")
            fi
          done
          
          echo "要发布的一级目录包: ${FIRST_LEVEL_DIRS[*]}"

          PARALLEL=${NPM_PUBLISH_PARALLEL:-4}
          FAIL=0
          PIDS=()

          for dir in "${FIRST_LEVEL_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "目录 $dir 不存在，跳过..."
              continue
            fi

            publish_default_one "$dir" &
            PIDS+=("$!")

            if [ "${#PIDS[@]}" -ge "$PARALLEL" ]; then
              if ! wait -n; then
                FAIL=1
              fi
              PIDS=($(jobs -pr))
            fi
          done

          for pid in "${PIDS[@]}"; do
            if ! wait "$pid"; then
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "One or more package publishes failed on default registry"
            exit 1
          fi

          if [ -s "$MANUAL_LOG" ]; then
            {
              echo "### Manual publish required"
              while IFS= read -r line; do
                echo "- $line"
              done < "$MANUAL_LOG"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify cache bump
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL or NOTIFY_TOKEN not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response.txt || true
          fi

  genJson-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: ${{ secrets.REGISTRY_URL }}
      
      - name: Generate JSON
        run: node .scripts_git_action/genjson.js

      - name: Generate library info files
        run: node .scripts_git_action/generate-info.js --all
      
      - name: Generate libraries index
        run: node .scripts_git_action/generate-libraries-index.js
      
      - name: Check if JSON file exists
        run: |
          if [ -f "./libraries.json" ]; then
            echo "File exists"
            cat ./libraries.json | head -n 10
          else
            echo "File does not exist"
            ls -la
            exit 1
          fi
      
      - name: Check if libraries index file exists
        run: |
          if [ -f "./libraries-index.json" ]; then
            echo "Libraries index file exists"
            cat ./libraries-index.json | head -n 10
          else
            echo "Libraries index file does not exist"
            ls -la
            exit 1
          fi
      
      - name: Upload JSON files to RustFS
        env:
          RUSTFS_ENDPOINT: ${{ secrets.RUSTFS_ENDPOINT }}
          RUSTFS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          RUSTFS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
          RUSTFS_BUCKET: ${{ secrets.RUSTFS_BUCKET }}
          RUSTFS_TARGET: ${{ secrets.RUSTFS_TARGET }}
        run: |
          if [ -z "$RUSTFS_ENDPOINT" ] || [ -z "$RUSTFS_ACCESS_KEY_ID" ] || [ -z "$RUSTFS_SECRET_ACCESS_KEY" ] || [ -z "$RUSTFS_BUCKET" ]; then
            echo "RustFS secrets not set, skipping."
            exit 0
          fi
          export AWS_ACCESS_KEY_ID="$RUSTFS_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$RUSTFS_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="us-east-1"
          PREFIX="${RUSTFS_TARGET:+${RUSTFS_TARGET}/}"
          for file in libraries.json libraries-index.json tags.json; do
            aws --endpoint-url "$RUSTFS_ENDPOINT" s3 cp "$file" "s3://${RUSTFS_BUCKET}/${PREFIX}${file}" --no-progress
          done
      
      - name: Prepare R2 Upload
        run: |
          mkdir -p r2_json
          cp libraries.json r2_json/
          cp libraries-index.json r2_json/
          cp tags.json r2_json/

      - name: Upload to R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: 'auto'
          SOURCE_DIR: 'r2_json'
          DEST_DIR: '${{ secrets.R2_JSON_TARGET }}'
      
  update-last-deploy-tag:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-publish
      - build-and-publish-all
      - genJson-and-upload
    if: >-
      ${{
        always() &&
        needs.detect-changes.result == 'success' &&
        contains(fromJson('["success","skipped"]'), needs.build-and-publish.result) &&
        contains(fromJson('["success","skipped"]'), needs.build-and-publish-all.result) &&
        needs.genJson-and-upload.result == 'success'
      }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}

      - name: Update last deploy tag
        run: |
          git tag -f last-deploy ${{ github.sha }}
          git push -f origin last-deploy
